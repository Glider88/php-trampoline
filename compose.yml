services:
  php:
    image: php-trampoline/php
    container_name: php-trampoline
    build: .docker/php
    extra_hosts:
      - host.docker.internal:host-gateway
    volumes:
      - .docker/php/xdebug.ini:/usr/local/etc/php/conf.d/xdebug.ini
      - .:/usr/src/app
    environment:
        PHP_IDE_CONFIG: "serverName=docker-trampoline-php"
